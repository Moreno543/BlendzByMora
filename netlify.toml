[build]
  command = "npm run build"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  # Bundled functions read secrets at runtime; omit bundles from secret scan false positives.
  SECRETS_SCAN_OMIT_PATHS = ".netlify/functions-internal/**"

[functions]
  node_bundler = "esbuild"

# Hourly UTC: ~24h reminder SMS (see TWILIO_SETUP.md)
[functions.booking-reminders]
  schedule = "0 * * * *"
