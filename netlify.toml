[build]
  command = "npm run build"
  publish = "."
  functions = "netlify/functions"

[build.environment]
  # Function bundles read secrets at runtime via process.env — not from published static files.
  SECRETS_SCAN_OMIT_PATHS = ".netlify/**"
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[functions]
  node_bundler = "esbuild"

# Hourly UTC: ~24h reminder SMS (see TWILIO_SETUP.md)
[functions.booking-reminders]
  schedule = "0 * * * *"
